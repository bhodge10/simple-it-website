<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Simple IT Blog Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Default a new post's author to the logged-in user.
      // Decap can't pre-fill the form field from the current user, so we set it
      // at save time — but only when the author is still empty or the generic
      // default, so deliberate names (and other authors' posts) are preserved.
      CMS.registerEventListener({
        name: "preSave",
        handler: ({ entry }) => {
          const data = entry.get("data");
          const author = data.get("author");
          if (author && author !== "Simple IT Team") {
            return; // leave a deliberately-set author alone
          }
          const user =
            window.netlifyIdentity && window.netlifyIdentity.currentUser();
          if (!user) {
            return;
          }
          const name =
            (user.user_metadata && user.user_metadata.full_name) || user.email;
          if (name) {
            return data.set("author", name);
          }
        },
      });
    </script>
</body>
</html>
